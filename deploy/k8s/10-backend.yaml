apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-backend
  namespace: alpaix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-backend
  template:
    metadata:
      labels:
        app: demo-backend
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -text=hello-from-demo-backend
            - -listen=:8080
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-backend
  namespace: alpaix
spec:
  selector:
    app: demo-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
